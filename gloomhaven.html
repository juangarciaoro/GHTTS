<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gloomhaven - Libro de Escenarios</title>
<link rel="stylesheet" href="assets/gloomhaven.css">
</head>
<body>
<header>
  <button class="btn-header-toggle" id="btnToggle" onclick="toggleSidebar()" title="Mostrar/ocultar lista">&#9776;</button>
  <div class="header-divider"></div>
  <img class="header-logo" src="assets/gh-logo.png" alt="Gloomhaven" />
  <span class="header-subtitle">Libro de Escenarios</span>
  <button class="immersive-btn" id="btnImmersive" onclick="toggleImmersive()" title="Modo inmersivo — oculta todo excepto el texto">⛶ Inmersivo</button>
    <button class="btn primary auth-btn" id="btnAuth" onclick="openAuthModal()" title="Iniciar sesión / Panel">Acceder</button>
</header>
<button class="immersive-exit" onclick="toggleImmersive()">✕ Salir</button>
<!-- ...existing code... -->
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">⚔ Escenarios</div>
    <div class="search"><input id="q" type="text" placeholder="Buscar escenario..." oninput="filter()"></div>
    <div class="list" id="list"></div>
  </div>
  <div class="main">
    <div class="controls">
      <div class="ctrl-title" id="ctitle">Selecciona un escenario</div>
      <div class="controls-right">
        <div class="audio-dot grey" id="audioDot" title="Estado del audio"></div>
        <button class="btn dl" id="btnDl" onclick="downloadScAudio()" style="display:none">&#8595; Descargar audio</button>
      </div>
    </div>
    <div class="music-fab" id="musicFab" title="Música" onclick="toggleMusicBar()"><img src="assets/lute.svg" alt="Música" class="music-fab-icon" /></div>
    <div class="tabs" id="tabs"></div>
    <div class="prog"><div class="prog-fill" id="prog"></div></div>
    <div class="content" id="content">
      <div class="welcome">
        <img class="welcome-emblem" src="assets/header-logo.svg" alt="Emblema Gloomhaven" width="100" height="100" />
        <h2>Gloomhaven</h2>
        <p class="welcome-quote">"La oscuridad tiene sus propias recompensas<br>para aquellos lo suficientemente valientes."</p>
        <p>Selecciona un escenario de la lista y pulsa <strong>▶ Leer</strong> para escuchar la narración.</p>
      </div>
    </div>
  </div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<button class="btn-top" id="btnTop" onclick="document.getElementById('content').scrollTo({top:0,behavior:'smooth'})">&#8679;</button>
<div id="banner" class="banner"></div>
<!-- music-fab movido dentro de .main -->
<div class="music-bar" id="musicBar">
  <span class="music-label">🎵</span>
  <span class="music-title" id="musicTitle">Sin música</span>
  <button class="btn-music" id="btnMusicPlay" onclick="toggleMusic()" title="Play/Pausa música">▶</button>
  <button class="btn-music" id="btnMusicNext" onclick="nextTrack()" title="Siguiente pista">⏭</button>
  <div class="music-vol">
    Vol: <input type="range" id="musicVol" min="0" max="1" step="0.05" value="0.18"
      oninput="setMusicVol(this.value)">
  </div>
  <select id="musicMode" onchange="setMusicMode(this.value)">
    <option value="ambient">Ambiente</option>
    <option value="epic">Épica</option>
    <option value="dark">Oscura</option>
    <option value="off">Apagada</option>
  </select>
</div>
<!-- Supabase client (moved to assets/gloomhaven.js) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
<script src="assets/gloomhaven.js"></script>

<!-- Auth modal + credentials panel -->
<div id="authModal" class="modal" style="display:none;">
  <div class="modal-content">
    <button class="modal-close" onclick="closeAuthModal()" title="Cerrar">✕</button>

    <!-- Login / Register form -->
    <div id="authForms">
      <div class="modal-header">
        <span class="modal-emblem">⚔</span>
        <h3 id="authTitle">Acceder</h3>
      </div>
      <div class="modal-divider"></div>
      <div class="modal-fields">
        <label for="authEmail">Email</label>
        <input id="authEmail" type="email" autocomplete="username" placeholder="tu@email.com" />
        <label for="authPass">Contraseña</label>
        <input id="authPass" type="password" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <div class="modal-actions">
        <button id="btnRegisterAction" onclick="signUpFromModal()" class="btn primary modal-btn-submit">Acceder</button>
        <button onclick="closeAuthModal()" class="btn modal-btn-cancel">Cancelar</button>
      </div>
    </div>

    <!-- Profile / credentials panel -->
    <div id="credPanel" style="display:none;">
      <div class="modal-header">
        <span class="modal-emblem">⚔</span>
        <h3 class="modal-panel-title">Perfil y credenciales</h3>
      </div>
      <div class="modal-divider"></div>
      <div class="modal-fields">
        <label for="displayName">Nombre a mostrar</label>
        <input id="displayName" type="text" placeholder="Tu nombre visible" autocomplete="nickname" />
        <label for="elevenKey">API Key — ElevenLabs</label>
        <input id="elevenKey" type="password" placeholder="sk_..." autocomplete="off" />
        <label for="elevenVoice">Voice ID</label>
        <input id="elevenVoice" type="text" placeholder="voice-id" autocomplete="off" />
      </div>
      <div class="modal-actions">
        <button onclick="saveProfileAndCredentials()" class="btn primary modal-btn-submit">Guardar</button>
        <button onclick="signOut()" id="btnLogout" class="btn warn">Cerrar sesión</button>
      </div>
    </div>

    <!-- Message area -->
    <div id="authMsg" class="modal-msg"></div>
  </div>
</div>

</body>
</html>
